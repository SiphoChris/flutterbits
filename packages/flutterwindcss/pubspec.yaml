name: flutterwindcss
description: >-
  Tailwind CSS v4 design system and styling vocabulary for Flutter — tokens,
  theming, and a typed utility API over the widgets layer.
version: 1.0.3
repository: https://github.com/SiphoChris/flutterbits
issue_tracker: https://github.com/SiphoChris/flutterbits/issues
topics:
  - tailwind
  - theming
  - design-tokens
  - ui
  - styling
resolution: workspace

environment:
  # Required APIs (Color.withValues / Color.a per §3.8, the Flex `spacing` param)
  # and pub workspaces land in Flutter 3.27 / Dart 3.6. We floor one minor higher
  # at Dart 3.7 / Flutter 3.29 so the codebase keeps the modern "tall" dart-format
  # style (Dart 3.7+) instead of the legacy style. A CI job pins this floor.
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
