name: flutterwindcss
description: >-
  Tailwind CSS v4 design system and styling vocabulary for Flutter — tokens,
  theming, and a typed utility API over the widgets layer.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  # Floor driven by the wide-gamut Color API (Color.withValues / Color.a, §3.8),
  # the Flex `spacing` parameter, and pub workspaces — all land in Dart 3.6 /
  # Flutter 3.27. CI also runs a job pinned to this floor to keep it honest.
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
