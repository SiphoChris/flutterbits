name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flutterwindcss
    steps:
      - uses: actions/checkout@v5
      # Pinned for deterministic goldens (spec R1). Bump deliberately + re-baseline.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
      - run: flutter pub get
      - name: Analyze (zero warnings)
        run: flutter analyze --fatal-infos --fatal-warnings
      - name: Format check
        run: dart format --output=none --set-exit-if-changed --line-length 100 .
      - name: Test (incl. goldens)
        run: flutter test
      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: packages/flutterwindcss/test/**/failures/
          if-no-files-found: ignore

  example-app:
    # The engine showcase (apps/example) is the runnable compile target + smoke-test
    # vehicle (AGENTS.md §9). Analyze, format-check, and run its widget smoke tests
    # so a change that breaks the example — or the engine API it consumes — fails CI.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/example
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
      - run: flutter pub get
      - name: Analyze (zero warnings)
        run: flutter analyze --fatal-infos --fatal-warnings
      - name: Format check
        run: dart format --output=none --set-exit-if-changed --line-length 100 .
      - name: Smoke tests (every section, light/dark, LTR/RTL)
        run: flutter test

  floor-compat:
    # Verifies the toolchain floor (AGENTS.md §2): the package must compile and
    # its unit tests must pass on the MINIMUM supported Flutter/Dart. Goldens are
    # excluded — they are baselined on the pinned newer version in analyze-and-test.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flutterwindcss
    steps:
      - uses: actions/checkout@v5
      # The declared floor (Flutter 3.29 / Dart 3.7). If this job fails, the real
      # floor is higher — raise it in both pubspecs + the README, don't delete this.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.0
      - run: flutter pub get
      - name: Analyze on floor (compiles lib + tests)
        run: flutter analyze --fatal-infos --fatal-warnings
      - name: Unit tests on floor (goldens excluded)
        run: flutter test test/tokens

  docs-generator:
    # Lints, type-checks, and tests the generator TypeScript in apps/docs (the
    # tweakcn→theme.dart generator — color core G1, parse/emit/UI to follow).
    # apps/docs was previously uncovered by CI; this protects the generator's
    # correctness kernel. The type-check is SCOPED to src/lib/generator via
    # tsconfig.generator.json so it doesn't fail on the pre-existing Fumadocs
    # scaffold type errors under src/app (full app typegen is deferred).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docs
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11 # match the pnpm that wrote pnpm-lock.yaml (lockfileVersion 9.0)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/docs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Lint (eslint)
        run: pnpm run lint
      - name: Type-check the generator (scoped — excludes pre-existing scaffold errors)
        run: pnpm exec tsc -p tsconfig.generator.json
      - name: Test (vitest)
        run: pnpm test

  arch-guard:
    # Mechanically enforces the AGENTS.md §3 rules that are otherwise review-only,
    # so a violation fails the build instead of depending on a human catching it.
    # grep-only — no Flutter toolchain needed, so it's fast. Allowlists name the
    # single sanctioned exception per rule (those files arrive in Module 2).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: No Material import outside the FwThemeExtension bridge (§3.5)
        run: |
          if grep -rnF --include='*.dart' 'package:flutter/material.dart' packages/flutterwindcss/lib \
             | grep -vF 'lib/src/theme/fw_theme_extension.dart'; then
            echo "::error::Material import is banned outside the FwThemeExtension bridge (AGENTS.md §3.5)."
            exit 1
          fi
      - name: No withOpacity — use Color.withValues (§3.8)
        run: |
          if grep -rnF --include='*.dart' 'withOpacity' packages/flutterwindcss/lib; then
            echo "::error::withOpacity is banned; use Color.withValues(alpha: ...) (AGENTS.md §3.8)."
            exit 1
          fi
      - name: No direct Theme.of outside the theme bridge (§3.4)
        run: |
          # Whitespace-tolerant so `Theme . of(` can't dodge the guard.
          # Allowlist = the two Material-bridge files: context_fw.dart (defines
          # context.fw and documents the rule) and fw_theme_extension.dart, which
          # performs the actual Material lookup so the call — and the Material
          # import — stay confined to one file (spec §5.2/§5.3). Components, which
          # §3.4 actually restricts, still cannot call Theme.of: they are not on
          # this allowlist.
          if grep -rnE --include='*.dart' 'Theme\s*\.\s*of\b' packages/flutterwindcss/lib \
             | grep -vF 'lib/src/theme/context_fw.dart' \
             | grep -vF 'lib/src/theme/fw_theme_extension.dart'; then
            echo "::error::Read tokens via context.fw, not Theme.of (AGENTS.md §3.4)."
            exit 1
          fi
      - name: Directional layout only — no left/right insets or alignments (§3.3)
        run: |
          # Catches: EdgeInsets.only(left:/right:), EdgeInsets.fromLTRB(, the raw
          # Alignment( constructor (use AlignmentDirectional or a named const),
          # and the non-directional named Alignment corners.
          if grep -rnE --include='*.dart' \
             'EdgeInsets\.only\([^)]*(left|right):|EdgeInsets\.fromLTRB\(|\bAlignment\(|Alignment\.(centerLeft|centerRight|topLeft|topRight|bottomLeft|bottomRight)\b' \
             packages/flutterwindcss/lib; then
            echo "::error::Use EdgeInsetsDirectional / AlignmentDirectional (AGENTS.md §3.3)."
            exit 1
          fi
      # NOTE: §3.1 (no hardcoded Color(0x...) in components) and §3.7 (no className
      # string parsing) get a guard against registry/ once the first component lands.
